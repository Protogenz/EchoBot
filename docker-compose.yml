services:
  - type: web
    name: titanbot
    runtime: docker
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: GUILD_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: titanbot-db
          property: connectionString
      - key: PORT
        value: "3000"

databases:
  - name: titanbot-db
    plan: basic-1gb
    postgresMajorVersion: "15"
